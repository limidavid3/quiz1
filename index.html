const uploadImage = async (b64,mime,fname) => {
  const raw=atob(b64.split(",")[1]), arr=new Uint8Array(raw.length);
  for(let i=0;i<raw.length;i++) arr[i]=raw.charCodeAt(i);
  const r=await fetch(SB_URL+"/storage/v1/object/"+BUCKET+"/"+fname,{method:"POST",headers:{"apikey":SB_KEY,"Authorization":"Bearer "+SB_KEY,"Content-Type":mime,"x-upsert":"true"},body:new Blob([arr],{type:mime})});
  if(!r.ok) throw new Error("上傳失敗");
  return SB_URL+"/storage/v1/object/public/"+BUCKET+"/"+fname;
};

      <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet"/>

function HomeScreen({ bank, onStart, onPaper, setLb }) {
  const [selKeys, setSelKeys]   = useState([]);
  const [qCount,  setQCount]    = useState(10);
  const [byUnit,  setByUnit]    = useState(true);
  const [mode,    setMode]      = useState("quiz");
  const [openSid, setOpenSid]   = useState(null);
  const [searchText,  setST]    = useState("");
  const [filterSids,  setFS]    = useState([]);
  const [filterTypes, setFT]    = useState([]);
  const [filterYear,  setFY]    = useState("");
  const [searchResult,setSR]    = useState(null);
  const [showFilter,  setSF]    = useState(false);

  const bk     = (sid,uid) => sid+"_"+uid;
  const cntFor = (sid,uid) => bank.filter(q=>q.sid===sid&&q.uid===uid).length;
  const totalSel = selKeys.reduce((s,k)=>{ const[a,b]=k.split("_"); return s+cntFor(a,b); },0);
  const toggle   = k => setSelKeys(p=>p.includes(k)?p.filter(x=>x!==k):[...p,k]);
  const toggleSub = sub => {
    const keys=sub.units.filter(u=>cntFor(sub.id,u.id)>0).map(u=>bk(sub.id,u.id));
    const all=keys.length>0&&keys.every(k=>selKeys.includes(k));
    setSelKeys(p=>all?p.filter(k=>!keys.includes(k)):[...new Set([...p,...keys])]);
  };

  const doSearch = () => {
    const kwds = searchText.trim().toLowerCase().split(" ").filter(Boolean);
    const res = bank.filter((q,idx)=>{
      const sub=getSub(q.sid), unit=getUnit(q.sid,q.uid);
      const tl=(EXAM_TYPES.find(e=>e.id===q.source_type)?.label||"").toLowerCase();
      const ts=(EXAM_TYPES.find(e=>e.id===q.source_type)?.short||"").toLowerCase();
      const hay=[q.source_year||"",tl,ts,sub?.name||"",sub?.short||"",unit?.name||"",String(idx+1)].join(" ").toLowerCase();
      const textOk = kwds.length===0 || kwds.every(k=>{
        const stripped=k.replace(/^#/,"");
        return hay.includes(k) || (stripped&&String(idx+1)===stripped);
      });
      const sidOk  = filterSids.length===0  || filterSids.includes(q.sid);
      const typeOk = filterTypes.length===0 || filterTypes.includes(q.source_type);
      const yearOk = !filterYear || (q.source_year||"").includes(filterYear.trim());
      return textOk&&sidOk&&typeOk&&yearOk;
    }).map(q=>({...q,displayNum:bank.indexOf(q)+1}));
    setSR({found:res});
  };

  const clearAll = () => { setSR(null); setST(""); setFS([]); setFT([]); setFY(""); setSF(false); };
  const hasFilter = filterSids.length>0||filterTypes.length>0||filterYear;
  const activeSubs = SUBJECTS.filter(sub=>sub.units.some(u=>cntFor(sub.id,u.id)>0));

  const go = () => {
    if(!totalSel) return;
    const pool=selKeys.flatMap(k=>{const[a,b]=k.split("_");return bank.filter(q=>q.sid===a&&q.uid===b);});
    const picked=[...pool].sort(()=>Math.random()-.5).slice(0,Math.min(qCount,pool.length));
    const final=byUnit?[...picked].sort((a,b)=>{
      const si=SUBJECTS.findIndex(s=>s.id===a.sid)-SUBJECTS.findIndex(s=>s.id===b.sid);
      if(si!==0)return si;
      return getSub(a.sid).units.findIndex(u=>u.id===a.uid)-getSub(a.sid).units.findIndex(u=>u.id===b.uid);
    }):picked;
    mode==="paper"?onPaper({questions:final,qIdx:0,showAns:false,results:[],byUnit}):onStart({questions:final,qIdx:0,showAns:false,results:[],byUnit});
  };

  return (
    <div style={{animation:"fadein .4s ease"}}>
      {/* Search */}
      <div style={{marginBottom:20,paddingTop:16}}>
        <div style={{fontSize:11,color:"#555",marginBottom:8,fontFamily:"monospace",letterSpacing:1}}>🔍 查找題目</div>
        <div style={{display:"flex",gap:7,marginBottom:8}}>
          <input value={searchText} onChange={e=>setST(e.target.value)} onKeyDown={e=>e.key==="Enter"&&doSearch()}
            placeholder="關鍵字用空格分隔（年份、類別、科目、#題號）"
            style={{flex:1,padding:"10px 14px",borderRadius:9,background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.1)",color:"#ddd",fontSize:13,outline:"none"}}/>
          <button onClick={()=>setSF(v=>!v)} style={{padding:"10px 13px",borderRadius:9,fontSize:13,fontWeight:showFilter||hasFilter?700:400,background:showFilter||hasFilter?"rgba(79,130,204,0.15)":"rgba(255,255,255,0.04)",border:"1px solid "+(showFilter||hasFilter?"rgba(79,130,204,0.4)":"rgba(255,255,255,0.09)"),color:showFilter||hasFilter?"#4f82cc":"#666",whiteSpace:"nowrap"}}>
            篩選{hasFilter?" ●":""}
          </button>
          <button onClick={doSearch} style={{padding:"10px 16px",borderRadius:9,background:"linear-gradient(135deg,#4f82cc,#2f5fa0)",border:"none",color:"white",fontSize:13,fontWeight:700,whiteSpace:"nowrap"}}>查找</button>
        </div>
        {showFilter&&(
          <div style={{padding:14,borderRadius:10,background:"rgba(79,130,204,0.05)",border:"1px solid rgba(79,130,204,0.15)",marginBottom:8,display:"flex",flexDirection:"column",gap:12}}>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <span style={{fontSize:11,color:"#888",flexShrink:0}}>年份</span>
              <input value={filterYear} onChange={e=>setFY(e.target.value.replace(/\D/g,"").slice(0,4))} placeholder="例：113"
                style={{width:80,padding:"4px 9px",borderRadius:6,background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.1)",color:"#ddd",fontSize:12,outline:"none",textAlign:"center"}}/>
              <span style={{fontSize:11,color:"#555"}}>年</span>
            </div>
            <div>
              <div style={{fontSize:11,color:"#888",marginBottom:6}}>科目</div>
              <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
                {SUBJECTS.map(s=>{ const sel=filterSids.includes(s.id);
                  return <button key={s.id} onClick={()=>setFS(p=>sel?p.filter(x=>x!==s.id):[...p,s.id])}
                    style={{padding:"3px 10px",borderRadius:20,fontSize:11,fontWeight:sel?700:400,background:sel?s.bg:"rgba(255,255,255,0.03)",border:"1px solid "+(sel?s.border:"rgba(255,255,255,0.07)"),color:sel?s.color:"#666"}}>
                    {sel?"✓ ":""}{s.short}
                  </button>;
                })}
              </div>
            </div>
            <div>
              <div style={{fontSize:11,color:"#888",marginBottom:6}}>類別</div>
              <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
                {EXAM_TYPES.map(e=>{ const sel=filterTypes.includes(e.id);
                  return <button key={e.id} onClick={()=>setFT(p=>sel?p.filter(x=>x!==e.id):[...p,e.id])}
                    style={{padding:"3px 10px",borderRadius:20,fontSize:11,fontWeight:sel?700:400,background:sel?"rgba(79,130,204,0.14)":"rgba(255,255,255,0.03)",border:"1px solid "+(sel?"rgba(79,130,204,0.4)":"rgba(255,255,255,0.07)"),color:sel?"#4f82cc":"#666"}}>
                    {sel?"✓ ":""}{e.label}
                  </button>;
                })}
              </div>
            </div>
            <button onClick={clearAll} style={{alignSelf:"flex-end",padding:"4px 12px",borderRadius:6,fontSize:11,background:"transparent",border:"1px solid rgba(255,255,255,0.08)",color:"#555"}}>清除全部</button>
          </div>
        )}
        {searchResult&&(
          <div style={{borderRadius:10,background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.07)",overflow:"hidden"}}>
            <div style={{padding:"10px 14px",borderBottom:"1px solid rgba(255,255,255,0.06)",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
              <div style={{fontSize:12,color:"#888"}}>找到 <span style={{color:"#4f82cc",fontWeight:700}}>{searchResult.found.length}</span> 題</div>
              <button onClick={()=>setSR(null)} style={{background:"transparent",border:"none",color:"#444",fontSize:16}}>✕</button>
            </div>
            {searchResult.found.length===0
              ? <div style={{padding:24,textAlign:"center",color:"#444",fontSize:13}}>找不到符合的題目</div>
              : <div style={{maxHeight:480,overflowY:"auto"}}>
                  {searchResult.found.map((q,i)=>{
                    const sub=getSub(q.sid),unit=getUnit(q.sid,q.uid),src=fmtSrc(q.source_year,q.source_type);
                    return (
                      <div key={q.id} style={{padding:"12px 14px",borderBottom:"1px solid rgba(255,255,255,0.04)"}}>
                        <div style={{display:"flex",gap:6,alignItems:"center",marginBottom:8,flexWrap:"wrap"}}>
                          <span style={{fontFamily:"monospace",fontSize:11,color:"#4f82cc",fontWeight:700}}>#{q.displayNum}</span>
                          <Pill color={sub?.color} bg={sub?.bg} border={sub?.border}>{sub?.short}</Pill>
                          <Pill color="#555" bg="rgba(255,255,255,0.03)" border="rgba(255,255,255,0.06)">{unit?.name}</Pill>
                          {src&&<span style={{fontSize:10,color:"#666"}}>📌 {src}</span>}
                        </div>
                        {q.q_url&&<div style={{marginBottom:6}}>
                          <div style={{fontSize:10,color:"#4f82cc",marginBottom:3}}>🖼 題目（點擊放大）</div>
                          <img src={q.q_url} onClick={()=>setLb({src:q.q_url,title:"#"+q.displayNum+" 題目"})} style={{width:"100%",height:"auto",display:"block",borderRadius:7,cursor:"pointer",border:"1px solid rgba(255,255,255,0.07)"}} alt="q"/>
                        </div>}
                        {q.a_url&&<div style={{marginBottom:6}}>
                          <div style={{fontSize:10,color:"#3d9e6e",marginBottom:3}}>✓ 答案（點擊放大）</div>
                          <img src={q.a_url} onClick={()=>setLb({src:q.a_url,title:"#"+q.displayNum+" 答案"})} style={{width:"100%",height:"auto",display:"block",borderRadius:7,cursor:"pointer",border:"1px solid rgba(61,158,110,0.2)",background:"rgba(61,158,110,0.03)"}} alt="a"/>
                        </div>}
                        {q.explanation&&<div style={{fontSize:11,color:"#9b6bbf",background:"rgba(114,85,184,0.07)",border:"1px solid rgba(114,85,184,0.15)",borderRadius:6,padding:"6px 9px",lineHeight:1.7}}>
                          🤖 {q.explanation.slice(0,250)}{q.explanation.length>250?"…":""}
                        </div>}
                      </div>
                    );
                  })}
                </div>
            }
          </div>
        )}
      </div>

      <div style={{padding:"4px 0 20px",textAlign:"center"}}>
        <div style={{fontSize:"clamp(24px,5vw,38px)",fontWeight:700,letterSpacing:-1,marginBottom:6}}>隨機出題</div>
        <div style={{fontSize:13,color:"#555"}}>選擇範圍 · 設定題數 · 開始作答</div>
      </div>

      {activeSubs.length===0
        ? <div style={{textAlign:"center",padding:"48px 20px",background:"rgba(255,255,255,0.02)",borderRadius:14,border:"1px dashed rgba(255,255,255,0.07)",color:"#444"}}>
            <div style={{fontSize:36,marginBottom:12}}>📭</div>
            <div style={{fontSize:14,color:"#555",marginBottom:6}}>題庫是空的</div>
            <div style={{fontSize:12,color:"#333"}}>點右上角「🗄 題庫」上傳題目</div>
          </div>
        : <>
          <div style={{display:"flex",flexDirection:"column",gap:6,marginBottom:20}}>
            {activeSubs.map(sub=>{
              const subCnt=bank.filter(q=>q.sid===sub.id).length;
              const selCnt=sub.units.filter(u=>selKeys.includes(bk(sub.id,u.id))).length;
              const allSel=sub.units.filter(u=>cntFor(sub.id,u.id)>0).every(u=>selKeys.includes(bk(sub.id,u.id)));
              const open=openSid===sub.id;
              return (
                <div key={sub.id} style={{borderRadius:11,border:"1px solid "+(selCnt>0?sub.border:"rgba(255,255,255,0.07)"),background:selCnt>0?sub.bg:"rgba(255,255,255,0.02)",overflow:"hidden",transition:"border .2s"}}>
                  <div style={{display:"flex",alignItems:"center",padding:"11px 14px",gap:8,cursor:"pointer"}} onClick={()=>setOpenSid(open?null:sub.id)}>
                    <div onClick={e=>{e.stopPropagation();toggleSub(sub);}} style={{width:22,height:22,borderRadius:6,flexShrink:0,background:allSel?sub.color:"transparent",border:"2px solid "+(allSel?sub.color:selCnt>0?sub.color+"88":"#333"),display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,color:"white",cursor:"pointer"}}>
                      {allSel?"✓":selCnt>0&&<div style={{width:8,height:8,borderRadius:2,background:sub.color}}/>}
                    </div>
                    <div style={{flex:1}}>
                      <div style={{fontSize:14,fontWeight:700,color:selCnt>0?sub.color:"#aaa"}}>{sub.name}</div>
                      <div style={{fontSize:11,color:"#444",marginTop:1}}>{selCnt>0?"已選 "+selCnt+" 單元 · ":""}{subCnt} 題</div>
                    </div>
                    <div style={{fontSize:12,color:"#444",transform:open?"rotate(180deg)":"none",transition:"transform .2s"}}>▼</div>
                  </div>
                  {open&&(
                    <div style={{padding:"0 14px 12px",display:"flex",gap:6,flexWrap:"wrap",borderTop:"1px solid rgba(255,255,255,0.04)"}}>
                      {sub.units.filter(u=>cntFor(sub.id,u.id)>0).map(u=>{
                        const cnt=cntFor(sub.id,u.id),k=bk(sub.id,u.id),sel=selKeys.includes(k);
                        return <button key={u.id} onClick={()=>toggle(k)} style={{marginTop:7,padding:"5px 11px",borderRadius:7,fontSize:12,display:"flex",alignItems:"center",gap:4,background:sel?sub.bg:"rgba(255,255,255,0.03)",border:"1px solid "+(sel?sub.border:"rgba(255,255,255,0.07)"),color:sel?sub.color:"#666",fontWeight:sel?700:400}}>
                          <span style={{fontSize:9,color:IMP.colors[u.imp]}}>{IMP.stars[u.imp]}</span>{u.name}<span style={{fontFamily:"monospace",fontSize:10,opacity:.6}}>{cnt}</span>
                        </button>;
                      })}
                    </div>
                  )}
                </div>
              );
            })}
          </div>
          {totalSel>0&&(
            <div style={{background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:12,padding:16,marginBottom:16}}>
              <div style={{display:"flex",gap:7,marginBottom:14}}>
                {[{v:"quiz",icon:"✏️",l:"互動作答"},{v:"paper",icon:"🖨",l:"產出考卷"}].map(({v,icon,l})=>(
                  <button key={v} onClick={()=>setMode(v)} style={{flex:1,padding:9,borderRadius:9,fontSize:13,fontWeight:mode===v?700:400,background:mode===v?"rgba(79,130,204,0.14)":"rgba(255,255,255,0.02)",border:"1px solid "+(mode===v?"rgba(79,130,204,0.35)":"rgba(255,255,255,0.07)"),color:mode===v?"#4f82cc":"#666"}}>{icon} {l}</button>
                ))}
              </div>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
                <div>
                  <div style={{fontSize:13,color:"#a0a0b8"}}>依單元分組</div>
                  <div style={{fontSize:10,color:"#3e3e50",marginTop:1}}>{byUnit?"按科目／單元排列":"隨機混合"}</div>
                </div>
                <Toggle val={byUnit} set={setByUnit}/>
              </div>
              <div>
                <div style={{fontSize:12,color:"#666",marginBottom:8}}>題數：<span style={{color:"#4f82cc",fontFamily:"monospace",fontWeight:700,fontSize:14}}>{Math.min(qCount,totalSel)}</span><span style={{color:"#333",marginLeft:4}}>/ {totalSel} 可用</span></div>
                <div style={{display:"flex",gap:6,flexWrap:"wrap",alignItems:"center"}}>
                  {[5,10,15,20,25,30].filter(n=>n<=totalSel+4).map(n=>(
                    <button key={n} onClick={()=>setQCount(n)} disabled={n>totalSel}
                      style={{padding:"6px 13px",borderRadius:7,fontSize:13,fontWeight:qCount===n?700:400,background:qCount===n?"rgba(79,130,204,0.14)":"rgba(255,255,255,0.03)",border:"1px solid "+(qCount===n?"rgba(79,130,204,0.35)":"rgba(255,255,255,0.07)"),color:n>totalSel?"#1e1e2e":qCount===n?"#4f82cc":"#666"}}>{n}</button>
                  ))}
                  <input type="number" min={1} max={totalSel} value={qCount} onChange={e=>setQCount(Math.max(1,Math.min(totalSel,parseInt(e.target.value)||1)))}
                    style={{width:60,padding:"6px 8px",borderRadius:7,fontSize:13,background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.09)",color:"#aaa",outline:"none",textAlign:"center"}}/>
                </div>
              </div>
            </div>
          )}
          <button onClick={go} disabled={!totalSel} style={{width:"100%",padding:16,borderRadius:13,fontSize:17,fontWeight:700,background:totalSel?"linear-gradient(135deg,#4f82cc,#2f5fa0)":"rgba(255,255,255,0.03)",border:"none",color:totalSel?"white":"#1e1e2e",boxShadow:totalSel?"0 6px 24px rgba(79,130,204,0.3)":"none"}}>
            {!totalSel?"請先選擇科目範圍":mode==="paper"?"產出 "+Math.min(qCount,totalSel)+" 題考卷":"開始 "+Math.min(qCount,totalSel)+" 題作答 →"}
          </button>
        </>
      }
    </div>
  );
}

function QuizScreen({ session, setSession, setScreen, setLb }) {
  const {questions,qIdx,showAns}=session;
  const [showExp,  setShowExp]  = useState(false);
  const [ansPwOpen,setAnsPwOpen]= useState(false);
  const prevIdx=useRef(qIdx);
  const q=questions[qIdx],sub=getSub(q?.sid),unit=getUnit(q?.sid,q?.uid);
  useEffect(()=>{if(prevIdx.current!==qIdx){setShowExp(false);prevIdx.current=qIdx;}},[qIdx]);
  const reveal=()=>setAnsPwOpen(true);
  const onAnsUnlock=()=>{ setAnsPwOpen(false); setSession(s=>({...s,showAns:true})); };
  const mark=correct=>{
    const nr=[...session.results,{...q,correct}];
    if(qIdx+1>=questions.length){setSession(s=>({...s,results:nr}));setScreen(SCREENS.RESULT);}
    else setSession(s=>({...s,results:nr,qIdx:qIdx+1,showAns:false}));
  };
  if(!q) return null;
  return (
    <div style={{animation:"fadein .3s ease"}}>
      <div style={{height:3,background:"rgba(255,255,255,0.06)",borderRadius:2,marginBottom:16,overflow:"hidden"}}>
        <div style={{height:"100%",background:"linear-gradient(90deg,"+sub.color+","+sub.color+"88)",width:((qIdx+1)/questions.length*100)+"%",transition:"width .4s",borderRadius:2}}/>
      </div>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
        <div style={{display:"flex",gap:5}}><Pill color={sub.color} bg={sub.bg} border={sub.border}>{sub.name}</Pill><Pill color="#555" bg="rgba(255,255,255,0.03)" border="rgba(255,255,255,0.06)">{unit?.name}</Pill></div>
        <div style={{fontFamily:"monospace",fontSize:13,color:"#444",fontWeight:600}}>{qIdx+1}<span style={{color:"#252535"}}>/{questions.length}</span></div>
      </div>
      {(q.source_year||q.source_type||unit?.imp)&&(
        <div style={{fontSize:11,color:"#555",marginBottom:12,display:"flex",gap:10,flexWrap:"wrap"}}>
          {(q.source_year||q.source_type)&&<span>📌 {fmtSrc(q.source_year,q.source_type)}</span>}
          {unit?.imp&&<span style={{color:IMP.colors[unit.imp]}}>{IMP.stars[unit.imp]} 重要度 {unit.imp}</span>}
        </div>
      )}
      <div style={{borderRadius:12,overflow:"hidden",background:"rgba(255,255,255,0.025)",border:"1px solid "+(showAns?"rgba(255,255,255,0.06)":sub.border),marginBottom:16,cursor:q.q_url?"pointer":"default",transition:"border .3s"}}
        onClick={()=>q.q_url&&setLb({src:q.q_url,title:"題目 "+(qIdx+1)})}>
        {q.q_url?<img src={q.q_url} style={{width:"100%",display:"block",objectFit:"contain",padding:10,maxHeight:400}} alt="q"/>
                :<div style={{padding:48,textAlign:"center",color:"#2a2a3a",fontSize:13}}>無題目圖片</div>}
      </div>
      {!showAns
        ? <button onClick={reveal} style={{width:"100%",padding:15,borderRadius:12,fontWeight:700,fontSize:16,background:"linear-gradient(135deg,"+sub.color+","+sub.color+"aa)",border:"none",color:"#fff",boxShadow:"0 4px 20px "+sub.color+"44"}}>顯示答案</button>
        : <div style={{animation:"fadein .3s ease"}}>
            <div style={{borderRadius:12,overflow:"hidden",background:"rgba(61,158,110,0.06)",border:"1px solid rgba(61,158,110,0.22)",marginBottom:14,cursor:q.a_url?"pointer":"default"}}
              onClick={()=>q.a_url&&setLb({src:q.a_url,title:"答案 "+(qIdx+1)})}>
              {q.a_url?<img src={q.a_url} style={{width:"100%",display:"block",objectFit:"contain",padding:10,maxHeight:400}} alt="a"/>
                      :<div style={{padding:24,textAlign:"center",color:"#2a4a3a",fontSize:13}}>（未上傳答案圖片）</div>}
            </div>
            {ansPwOpen && <AnsPwModal onSuccess={onAnsUnlock} onClose={()=>setAnsPwOpen(false)}/>}
            {q.explanation
              ? <div className="noprint" style={{marginBottom:14}}>
                  {!showExp
                    ? <button onClick={()=>setShowExp(true)} style={{width:"100%",padding:11,borderRadius:10,fontSize:13,fontWeight:600,background:"rgba(114,85,184,0.1)",border:"1px solid rgba(114,85,184,0.3)",color:"#9b6bbf",display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>🤖 AI 解題說明</button>
                    : <div style={{borderRadius:10,background:"rgba(114,85,184,0.06)",border:"1px solid rgba(114,85,184,0.2)",overflow:"hidden"}}>
                        <div style={{padding:"10px 14px",borderBottom:"1px solid rgba(114,85,184,0.15)",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                          <span style={{fontSize:12,fontWeight:700,color:"#9b6bbf"}}>🤖 AI 解題說明</span>
                          <button onClick={()=>setShowExp(false)} style={{fontSize:11,color:"#555",background:"transparent",border:"none"}}>收起</button>
                        </div>
                        <div style={{padding:"14px 16px",fontSize:13,color:"#c0c0d8",lineHeight:1.9,whiteSpace:"pre-wrap"}}>{q.explanation}</div>
                      </div>
                  }
                </div>
              : <div className="noprint" style={{marginBottom:14,padding:"9px 14px",borderRadius:10,background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.05)",fontSize:12,color:"#3a3a4a",textAlign:"center"}}>此題無 AI 題解</div>
            }
            <div style={{fontSize:12,color:"#555",textAlign:"center",marginBottom:10}}>你答對了嗎？</div>
            <div style={{display:"flex",gap:10}}>
              <button onClick={()=>mark(false)} style={{flex:1,padding:14,borderRadius:12,fontWeight:700,fontSize:15,background:"rgba(217,95,59,0.1)",border:"1px solid rgba(217,95,59,0.3)",color:"#d95f3b"}}>✗ 答錯了</button>
              <button onClick={()=>mark(true)}  style={{flex:1,padding:14,borderRadius:12,fontWeight:700,fontSize:15,background:"rgba(61,158,110,0.1)",border:"1px solid rgba(61,158,110,0.3)",color:"#3d9e6e"}}>✓ 答對了</button>
            </div>
          </div>
      }
    </div>
  );
}

function ResultScreen({ session, setSession, setScreen, setLb }) {
  const {results}=session;
  const score=results.filter(r=>r.correct).length,pct=results.length>0?score/results.length:0;
  return (
    <div style={{animation:"fadein .4s ease"}}>
      <div style={{textAlign:"center",padding:"24px 0 20px"}}>
        <div style={{fontFamily:"monospace",fontSize:9,letterSpacing:4,color:"#4f82cc",marginBottom:12}}>RESULT</div>
        <div style={{position:"relative",display:"inline-block"}}>
          <svg width="120" height="120" viewBox="0 0 120 120">
            <circle cx="60" cy="60" r="52" fill="none" stroke="rgba(255,255,255,0.05)" strokeWidth="8"/>
            <circle cx="60" cy="60" r="52" fill="none" stroke={pct>=0.8?"#3d9e6e":pct>=0.6?"#c8922a":"#d95f3b"} strokeWidth="8"
              strokeDasharray={(pct*2*Math.PI*52)+" "+(2*Math.PI*52)} strokeDashoffset={2*Math.PI*52*0.25} strokeLinecap="round"/>
          </svg>
          <div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
            <div style={{fontFamily:"monospace",fontSize:28,fontWeight:700,lineHeight:1}}>{score}</div>
            <div style={{fontFamily:"monospace",fontSize:11,color:"#444"}}>/{results.length}</div>
          </div>
        </div>
        <div style={{fontSize:14,color:"#666",marginTop:10}}>{score===results.length?"🎉 全對！太強了":pct>=0.8?"優秀，繼續保持":pct>=0.6?"不錯，再加把勁":"繼續努力！"}</div>
      </div>
      <div style={{marginBottom:20}}>
        {SUBJECTS.filter(s=>results.some(r=>r.sid===s.id)).map(sub=>{
          const sr=results.filter(r=>r.sid===sub.id),ss=sr.filter(r=>r.correct).length;
          return <div key={sub.id} style={{display:"flex",alignItems:"center",gap:10,marginBottom:9}}>
            <div style={{width:52,fontSize:12,fontWeight:700,color:sub.color,flexShrink:0,textAlign:"right"}}>{sub.short}</div>
            <div style={{flex:1,height:6,background:"rgba(255,255,255,0.05)",borderRadius:3,overflow:"hidden"}}><div style={{height:"100%",background:sub.color,width:(ss/sr.length*100)+"%",borderRadius:3,transition:"width .6s"}}/></div>
            <div style={{fontFamily:"monospace",fontSize:11,color:"#555",width:32}}>{ss}/{sr.length}</div>
          </div>;
        })}
      </div>
      {results.filter(r=>!r.correct).length>0&&(
        <div style={{marginBottom:24}}>
          <div style={{fontSize:12,color:"#555",marginBottom:10}}><span style={{color:"#d95f3b",fontWeight:700}}>{results.filter(r=>!r.correct).length}</span> 題答錯</div>
          {results.filter(r=>!r.correct).map((r,i)=>{
            const s=getSub(r.sid),u=getUnit(r.sid,r.uid),src=fmtSrc(r.source_year,r.source_type);
            return <div key={i} style={{borderRadius:10,background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.06)",overflow:"hidden",marginBottom:8}}>
              <div style={{padding:"8px 12px",borderBottom:"1px solid rgba(255,255,255,0.04)",display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
                <span style={{fontSize:11,fontWeight:700,color:s.color}}>{s.short}</span>
                <span style={{fontSize:11,color:"#444"}}>·</span>
                <span style={{fontSize:11,color:"#555"}}>{u?.name}</span>
                {src&&<span style={{fontSize:10,color:"#404050",marginLeft:"auto"}}>📌 {src}</span>}
              </div>
              <div style={{display:"flex",minHeight:80}}>
                <div style={{flex:1,cursor:"pointer",borderRight:"1px solid rgba(255,255,255,0.04)"}} onClick={()=>r.q_url&&setLb({src:r.q_url,title:"題目"})}>
                  {r.q_url?<img src={r.q_url} style={{width:"100%",maxHeight:120,objectFit:"contain",display:"block",padding:6}} alt="q"/>:<div style={{height:80,display:"flex",alignItems:"center",justifyContent:"center",color:"#2a2a3a",fontSize:11}}>無圖</div>}
                </div>
                <div style={{flex:1,cursor:"pointer",background:"rgba(61,158,110,0.04)"}} onClick={()=>r.a_url&&setLb({src:r.a_url,title:"答案"})}>
                  {r.a_url?<img src={r.a_url} style={{width:"100%",maxHeight:120,objectFit:"contain",display:"block",padding:6}} alt="a"/>:<div style={{height:80,display:"flex",alignItems:"center",justifyContent:"center",color:"#2a4a3a",fontSize:11}}>無答案</div>}
                </div>
              </div>
            </div>;
          })}
        </div>
      )}
      <div style={{display:"flex",gap:9}}>
        <button onClick={()=>{setSession(s=>({...s,qIdx:0,showAns:false,results:[]}));setScreen(SCREENS.QUIZ);}} style={{flex:1,padding:13,borderRadius:11,fontWeight:700,fontSize:14,background:"linear-gradient(135deg,#4f82cc,#2f5fa0)",border:"none",color:"white"}}>再來一次</button>
        <button onClick={()=>setScreen(SCREENS.HOME)} style={{flex:1,padding:13,borderRadius:11,fontSize:14,background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.08)",color:"#666"}}>重新設定</button>
      </div>
    </div>
  );
}

function PaperScreen({ session, setScreen, setLb }) {
  const [view,setView]=useState("q");
  const {questions,byUnit}=session;
  const groups=(()=>{
    if(!byUnit) return [{label:null,color:null,qs:questions.map((q,i)=>({...q,num:i+1}))}];
    const g=[]; let num=1;
    SUBJECTS.forEach(sub=>sub.units.forEach(unit=>{
      const qs=questions.filter(q=>q.sid===sub.id&&q.uid===unit.id);
      if(qs.length) g.push({label:sub.name+" ／ "+unit.name,color:sub.color,qs:qs.map(q=>({...q,num:num++}))});
    }));
    return g;
  })();
  return (
    <div>
      <div className="noprint" style={{display:"flex",alignItems:"center",gap:7,marginBottom:14}}>
        <button onClick={()=>setScreen(SCREENS.HOME)} style={{background:"transparent",border:"1px solid rgba(255,255,255,0.08)",borderRadius:7,color:"#555",padding:"7px 13px",fontSize:12,whiteSpace:"nowrap"}}>← 返回</button>
        <div style={{display:"flex",gap:5,flex:1}}>
          {[{v:"q",l:"📋 題目卷"},{v:"a",l:"✅ 答案卷"}].map(({v,l})=>(
            <button key={v} onClick={()=>setView(v)} style={{flex:1,padding:7,borderRadius:7,fontSize:12,fontWeight:view===v?700:400,background:view===v?"rgba(79,130,204,0.12)":"rgba(255,255,255,0.02)",border:"1px solid "+(view===v?"rgba(79,130,204,0.3)":"rgba(255,255,255,0.07)"),color:view===v?"#4f82cc":"#555"}}>{l}</button>
          ))}
        </div>
        <button onClick={()=>window.print()} style={{background:"linear-gradient(135deg,#4f82cc,#2f5fa0)",border:"none",borderRadius:7,color:"white",padding:"7px 14px",fontSize:12,fontWeight:700,whiteSpace:"nowrap"}}>🖨 列印</button>
      </div>
      <div className="paper-sheet" style={{background:"rgba(255,255,255,0.015)",border:"1px solid rgba(255,255,255,0.06)",borderRadius:12,padding:"20px 18px"}}>
        <div style={{borderBottom:"1px solid rgba(255,255,255,0.07)",paddingBottom:12,marginBottom:18}}>
          <div style={{fontFamily:"monospace",fontSize:9,letterSpacing:4,color:"#4f82cc",marginBottom:4}}>{view==="q"?"EXAMINATION PAPER":"ANSWER KEY"}</div>
          <div style={{fontSize:18,fontWeight:700}}>土木工程計算題{view==="q"?"考卷":"標準答案"}</div>
          <div style={{display:"flex",gap:16,marginTop:8,fontSize:11,color:"#555",flexWrap:"wrap"}}>
            <span>共 {questions.length} 題</span><span>{byUnit?"依單元分組":"隨機混合"}</span>
            {view==="q"&&<><span>姓名：＿＿＿＿＿</span><span>分數：＿＿＿</span></>}
          </div>
        </div>
        {groups.map((g,gi)=>(
          <div key={gi} style={{marginBottom:18}}>
            {g.label&&<div style={{fontSize:11,fontWeight:700,color:g.color,borderLeft:"3px solid "+g.color,paddingLeft:9,marginBottom:12}}>{g.label}</div>}
            {g.qs.map((q,qi)=>(
              <div key={qi} style={{marginBottom:view==="q"?20:14,padding:"11px 12px",borderRadius:9,background:"rgba(255,255,255,0.01)",border:"1px solid rgba(255,255,255,0.04)"}}>
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
                  <span style={{fontFamily:"monospace",fontSize:12,fontWeight:700,color:"#4f82cc"}}>{q.num}.</span>
                  {(q.source_year||q.source_type)&&<span style={{fontSize:10,color:"#505060"}}>📌 {fmtSrc(q.source_year,q.source_type)}</span>}
                  {(()=>{const u=getUnit(q.sid,q.uid);return u&&<span style={{fontSize:9,color:IMP.colors[u.imp],marginLeft:"auto"}}>{IMP.stars[u.imp]}</span>;})()}
                </div>
                {q.q_url&&<img src={q.q_url} onClick={()=>setLb({src:q.q_url,title:"#"+q.num+" 題目"})} style={{width:"100%",maxHeight:240,objectFit:"contain",borderRadius:7,display:"block",cursor:"pointer",marginBottom:6}} alt="q"/>}
                {view==="q"&&<div style={{marginTop:6}}><div style={{height:50,borderBottom:"1px solid rgba(255,255,255,0.04)"}}/><div style={{height:1,borderBottom:"1px solid rgba(255,255,255,0.04)",marginTop:22}}/></div>}
                {view==="a"&&(
                  <div style={{borderRadius:8,overflow:"hidden",border:"1px solid rgba(61,158,110,0.2)",background:"rgba(61,158,110,0.05)"}}>
                    {q.a_url?<img src={q.a_url} onClick={()=>setLb({src:q.a_url,title:"#"+q.num+" 答案"})} style={{width:"100%",maxHeight:240,objectFit:"contain",display:"block",cursor:"pointer",padding:6}} alt="a"/>
                            :<div style={{padding:14,textAlign:"center",fontSize:12,color:"#2a4a3a"}}>（未上傳答案圖片）</div>}
                  </div>
                )}
              </div>
            ))}
          </div>
        ))}
      </div>
      <div className="noprint" style={{marginTop:10,display:"flex",gap:8}}>
        <button onClick={()=>setScreen(SCREENS.HOME)} style={{flex:1,padding:11,borderRadius:9,fontSize:13,background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.07)",color:"#666"}}>🔀 重新抽題</button>
        <button onClick={()=>window.print()} style={{flex:1,padding:11,borderRadius:9,fontSize:13,fontWeight:700,background:"linear-gradient(135deg,#4f82cc,#2f5fa0)",border:"none",color:"white"}}>🖨 列印</button>
      </div>
    </div>
  );
}

function BankPage({ bank, refreshBank, syncState, onClose, setLb }) {
  const [tab,     setTab]     = useState("overview");
  const [sid,     setSid]     = useState(SUBJECTS[0].id);
  const [unitId,  setUnitId]  = useState(SUBJECTS[0].units[0].id);
  const [editId,  setEditId]  = useState(null);
  const [uploading,setUploading]=useState([]);
  const [opState, setOpState] = useState("ok");
  const qRef=useRef(), bankRef=useRef(bank);
  useEffect(()=>{bankRef.current=bank;},[bank]);

  const sub=getSub(sid), unit=getUnit(sid,unitId), items=(bank||[]).filter(q=>q.sid===sid&&q.uid===unitId), total=(bank||[]).length;
  const sc={loading:"#555",saving:"#c8922a",ok:"#3d9e6e",error:"#d95f3b"};
  const cur=opState!=="ok"?opState:syncState;

  const addQImgs=async(files)=>{
    const arr=Array.from(files).filter(f=>f.type.startsWith("image/")); if(!arr.length) return;
    const ids=arr.map(f=>({id:genId(),name:f.name,step:"reading"}));
    setUploading(p=>[...p,...ids]);
    for(let i=0;i<arr.length;i++){
      const f=arr[i],ue=ids[i];
      try{
        setUploading(p=>p.map(u=>u.id===ue.id?{...u,step:"uploading"}:u));
        const b64=await toBase64(f);
        const fname=Date.now()+"_"+genId()+"."+f.name.split(".").pop();
        const qUrl=await uploadImage(b64,f.type,fname);
        setUploading(p=>p.map(u=>u.id===ue.id?{...u,step:"ai"}:u));
        let explanation="";
        try{const resp=await fetch(AI_WORKER,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({imageUrl:qUrl,subName:sub?.name||"",unitName:unit?.name||""})});const d=await resp.json();explanation=d.explanation||"";}catch{}
        setUploading(p=>p.map(u=>u.id===ue.id?{...u,step:"saving"}:u));
        await insertQ({sid,uid:unitId,q_url:qUrl,a_url:"",source_year:"",source_type:"",explanation});
        setUploading(p=>p.map(u=>u.id===ue.id?{...u,step:"done"}:u));
      }catch{ setUploading(p=>p.map(u=>u.id===ue.id?{...u,step:"error"}:u)); }
    }
    setTimeout(()=>setUploading(p=>p.filter(u=>!ids.find(x=>x.id===u.id))),3000);
    refreshBank();
  };

  const setAImg=async(id,file)=>{ if(!file||!file.type.startsWith("image/"))return; setOpState("saving"); try{const b64=await toBase64(file);const fn=Date.now()+"_a."+file.name.split(".").pop();const url=await uploadImage(b64,file.type,fn);await updateQ(id,{a_url:url});refreshBank();setOpState("ok");}catch{setOpState("error");}};
  const patch=async(id,f)=>{ setOpState("saving"); try{const db={};if(f.source!==undefined){db.source_year=f.source?.year||"";db.source_type=f.source?.type||"";}if(f.explanation!==undefined)db.explanation=f.explanation;await updateQ(id,db);refreshBank();setOpState("ok");}catch{setOpState("error");}};
  const del=async(id)=>{ setOpState("saving"); try{await deleteQ(id);refreshBank();setOpState("ok");}catch{setOpState("error");}};
  const regenExp=async(item)=>{ if(!item.q_url)return; try{const resp=await fetch(AI_WORKER,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({imageUrl:item.q_url,subName:getSub(item.sid)?.name||"",unitName:getUnit(item.sid,item.uid)?.name||""})});const d=await resp.json();if(d.explanation){await updateQ(item.id,{explanation:d.explanation});refreshBank();}}catch{}};

  return (
    <div style={{position:"fixed",inset:0,zIndex:100,background:"#0f1016",display:"flex",flexDirection:"column",height:"100vh",overflow:"hidden"}}>
      <div style={{padding:"14px 20px 10px",borderBottom:"1px solid rgba(255,255,255,0.07)",display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0}}>
        <div>
          <div style={{fontFamily:"monospace",fontSize:9,letterSpacing:3,color:"#4f82cc",marginBottom:2}}>BANK</div>
          <div style={{fontSize:15,fontWeight:700,display:"flex",alignItems:"center",gap:8}}>
            題庫管理 <span style={{fontFamily:"monospace",fontSize:10,color:sc[cur],fontWeight:400}}>{cur==="saving"?"⟳ 同步中":cur==="ok"?"● 已同步":cur==="error"?"✕ 失敗":"⟳ 連線中"}</span>
          </div>
        </div>
        <button onClick={onClose} style={{background:"rgba(255,255,255,0.06)",border:"none",color:"#888",width:36,height:36,borderRadius:"50%",fontSize:18,display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button>
      </div>
      <div style={{display:"flex",padding:"8px 20px 0",gap:6,borderBottom:"1px solid rgba(255,255,255,0.06)",flexShrink:0}}>
        {[{v:"overview",l:"📊 總覽 ("+total+")"},{v:"edit",l:"✏️ 管理題目"}].map(({v,l})=>(
          <button key={v} onClick={()=>setTab(v)} style={{padding:"6px 16px",borderRadius:"7px 7px 0 0",fontSize:12,fontWeight:tab===v?700:400,background:tab===v?"rgba(79,130,204,0.12)":"transparent",border:"1px solid "+(tab===v?"rgba(79,130,204,0.3)":"rgba(255,255,255,0.06)"),borderBottom:"none",color:tab===v?"#4f82cc":"#555"}}>{l}</button>
        ))}
      </div>

      {tab==="overview"&&(
        <div style={{flex:1,overflowY:"auto",padding:20}}>
          {SUBJECTS.map(s=>{
            const cnt=(bank||[]).filter(q=>q.sid===s.id).length; if(!cnt) return null;
            return <div key={s.id} style={{marginBottom:20}}>
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
                <div style={{fontSize:14,fontWeight:700,color:s.color}}>{s.name}</div>
                <div style={{fontFamily:"monospace",fontSize:11,color:"#444"}}>{cnt} 題</div>
              </div>
              <div style={{display:"flex",flexDirection:"column",gap:3}}>
                {s.units.map(u=>{
                  const c=(bank||[]).filter(q=>q.sid===s.id&&q.uid===u.id).length; if(!c) return null;
                  return <div key={u.id} style={{display:"flex",alignItems:"center",gap:8,padding:"7px 12px",borderRadius:8,background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.05)",cursor:"pointer"}}
                    onClick={()=>{setSid(s.id);setUnitId(u.id);setTab("edit");}}>
                    <span style={{fontSize:10,color:IMP.colors[u.imp]}}>{IMP.stars[u.imp]}</span>
                    <span style={{fontSize:13,color:"#aaa",flex:1}}>{u.name}</span>
                    <span style={{fontFamily:"monospace",fontSize:12,color:s.color,fontWeight:600}}>{c}</span>
                    <span style={{fontSize:11,color:"#333"}}>→</span>
                  </div>;
                })}
              </div>
            </div>;
          })}
          {total===0&&<div style={{textAlign:"center",padding:48,color:"#333",fontSize:13}}>題庫是空的</div>}
        </div>
      )}

      {tab==="edit"&&(<>
        <div style={{padding:"10px 16px 6px",borderBottom:"1px solid rgba(255,255,255,0.05)",flexShrink:0}}>
          <div style={{display:"flex",gap:4,flexWrap:"wrap",marginBottom:7}}>
            {SUBJECTS.map(s=>{const c=(bank||[]).filter(q=>q.sid===s.id).length;return(
              <button key={s.id} onClick={()=>{setSid(s.id);setUnitId(s.units[0].id);}} style={{padding:"3px 10px",borderRadius:15,fontSize:11,fontWeight:sid===s.id?700:400,background:sid===s.id?s.bg:"transparent",border:"1px solid "+(sid===s.id?s.border:"rgba(255,255,255,0.07)"),color:sid===s.id?s.color:"#4a4a5a",whiteSpace:"nowrap"}}>
                {s.short}{c>0&&<span style={{opacity:.5,marginLeft:2}}>·{c}</span>}
              </button>
            );})}
          </div>
          <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
            {sub.units.map(u=>{const c=(bank||[]).filter(q=>q.sid===sid&&q.uid===u.id).length,act=unitId===u.id;return(
              <button key={u.id} onClick={()=>setUnitId(u.id)} style={{padding:"2px 9px",borderRadius:5,fontSize:10,fontWeight:act?700:400,background:act?sub.bg:"transparent",border:"1px solid "+(act?sub.border:"rgba(255,255,255,0.05)"),color:act?sub.color:"#3a3a4a",whiteSpace:"nowrap",display:"flex",alignItems:"center",gap:3}}>
                <span style={{fontSize:8,color:IMP.colors[u.imp]}}>{IMP.stars[u.imp]}</span>{u.name}{c>0&&<span style={{color:act?sub.color:"#333",fontFamily:"monospace"}}>{c}</span>}
              </button>
            );})}
          </div>
        </div>
        <div style={{padding:"8px 16px",borderBottom:"1px solid rgba(255,255,255,0.04)",display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0}}>
          <div style={{fontSize:11,color:sub.color,fontWeight:600}}>{sub.name} · {unit?.name} <span style={{color:"#3a3a4a",fontWeight:400}}>({items.length}題)</span></div>
          <button onClick={()=>qRef.current?.click()} style={{padding:"6px 14px",borderRadius:7,fontSize:11,fontWeight:600,background:"linear-gradient(135deg,"+sub.color+","+sub.color+"cc)",border:"none",color:"#fff",whiteSpace:"nowrap"}}>＋ 上傳圖片</button>
          <input ref={qRef} type="file" multiple accept="image/*" style={{display:"none"}} onChange={e=>{addQImgs(e.target.files);e.target.value="";}}/>
        </div>
        <div style={{flex:1,overflowY:"auto",padding:"10px 16px",display:"flex",flexDirection:"column",gap:8}}>
          {uploading.length>0&&(
            <div style={{borderRadius:9,background:"rgba(114,85,184,0.07)",border:"1px solid rgba(114,85,184,0.2)",padding:"10px 14px",display:"flex",flexDirection:"column",gap:7}}>
              <div style={{fontSize:10,color:"#9b6bbf",fontFamily:"monospace",letterSpacing:1}}>上傳中</div>
              {uploading.map(u=>(
                <div key={u.id} style={{display:"flex",alignItems:"center",gap:8}}>
                  <span style={{fontSize:11,color:u.step==="done"?"#3d9e6e":u.step==="error"?"#d95f3b":"#9b6bbf",flexShrink:0}}>{u.step==="done"?"✓":u.step==="error"?"✕":u.step==="ai"?"🤖":u.step==="uploading"?"☁️":"📷"}</span>
                  <span style={{flex:1,fontSize:11,color:"#888",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{u.name}</span>
                  <span style={{fontSize:10,color:u.step==="done"?"#3d9e6e":u.step==="error"?"#d95f3b":"#7255b8",flexShrink:0,fontFamily:"monospace"}}>{u.step==="reading"?"讀取…":u.step==="uploading"?"上傳…":u.step==="ai"?"AI題解…":u.step==="saving"?"儲存…":u.step==="done"?"完成":"失敗"}</span>
                </div>
              ))}
            </div>
          )}
          {items.length===0&&uploading.length===0&&(
            <div onClick={()=>qRef.current?.click()} style={{border:"1px dashed rgba(255,255,255,0.07)",borderRadius:9,padding:40,textAlign:"center",cursor:"pointer",color:"#2a2a3a",fontSize:13}}>
              <div style={{fontSize:28,marginBottom:8}}>🖼</div>點擊上傳題目圖片
            </div>
          )}
          {items.map((item,idx)=>(
            <BankCard key={item.id} item={item} idx={idx} sub={sub}
              editing={editId===item.id} setEditing={v=>setEditId(v?item.id:null)}
              onDel={()=>del(item.id)} onPatch={f=>patch(item.id,f)}
              onSetAImg={f=>setAImg(item.id,f)} onLb={setLb} onRegen={()=>regenExp(item)}
            />
          ))}
          {items.length>0&&<div onClick={()=>qRef.current?.click()} style={{border:"1px dashed rgba(255,255,255,0.05)",borderRadius:7,padding:12,textAlign:"center",cursor:"pointer",color:"#252535",fontSize:11}}>＋ 繼續上傳</div>}
        </div>
      </>)}
    </div>
  );
}

function BankCard({ item, idx, sub, editing, setEditing, onDel, onPatch, onSetAImg, onLb, onRegen }) {
  const [year,setYear]=useState(item.source_year||"");
  const [type,setType]=useState(item.source_type||"");
  const [confirmDel,setConfirmDel]=useState(false);
  const [expanded,setExpanded]=useState(false);
  const [regenState,setRegenState]=useState("idle");
  const aRef=useRef();
  useEffect(()=>{setYear(item.source_year||"");setType(item.source_type||"");},[item.id]);
  const save=()=>{onPatch({source:{year:year.trim(),type}});setEditing(false);};
  const src=fmtSrc(item.source_year,item.source_type);
  const doRegen=async()=>{setRegenState("loading");try{await onRegen();setRegenState("done");setTimeout(()=>setRegenState("idle"),2000);}catch{setRegenState("error");setTimeout(()=>setRegenState("idle"),2500);}};

  return (
    <div style={{borderRadius:9,border:"1px solid "+(editing?sub.border:"rgba(255,255,255,0.06)"),background:editing?sub.bg:"rgba(255,255,255,0.02)",overflow:"hidden"}}>
      <div style={{padding:"7px 10px",borderBottom:"1px solid rgba(255,255,255,0.04)"}}>
        <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:editing?8:0}}>
          <span style={{fontFamily:"monospace",fontSize:10,color:sub.color,fontWeight:700}}>#{idx+1}</span>
          {!editing&&<>
            {src&&<span style={{fontSize:10,color:"#666",flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>📌 {src}</span>}
            <div style={{flex:1}}/>
            <button onClick={()=>setEditing(true)} style={{padding:"2px 8px",borderRadius:4,fontSize:10,background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.07)",color:"#555"}}>出處</button>
            {item.explanation&&<span style={{fontSize:9,color:"#7255b8",background:"rgba(114,85,184,0.1)",border:"1px solid rgba(114,85,184,0.2)",borderRadius:3,padding:"1px 5px"}}>🤖</span>}
          </>}
          {editing&&<div style={{flex:1,fontSize:11,color:sub.color,fontWeight:600}}>編輯出處</div>}
          <button onClick={()=>setConfirmDel(true)} style={{padding:"2px 6px",borderRadius:4,fontSize:11,background:"transparent",border:"1px solid rgba(255,255,255,0.05)",color:"#3a2525",flexShrink:0}}>✕</button>
        </div>
        {editing&&(
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <span style={{fontSize:11,color:"#666",flexShrink:0}}>年份</span>
              <input value={year} onChange={e=>setYear(e.target.value.replace(/\D/g,"").slice(0,4))} placeholder="例：113"
                style={{width:80,padding:"4px 8px",borderRadius:5,background:"rgba(255,255,255,0.07)",border:"1px solid rgba(255,255,255,0.12)",color:"#ddd",fontSize:12,outline:"none",textAlign:"center"}}/>
              <span style={{fontSize:11,color:"#555"}}>年</span>
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:5}}>
              <span style={{fontSize:11,color:"#666"}}>類別</span>
              <div style={{display:"flex",gap:4,flexWrap:"wrap",alignItems:"center"}}>
                <span style={{fontSize:10,color:"#555",flexShrink:0}}>技師：</span>
                {EXAM_TYPES.filter(e=>e.group==="技師").map(e=>{const sel=type===e.id;return(
                  <button key={e.id} onClick={()=>setType(sel?"":e.id)} style={{padding:"3px 9px",borderRadius:20,fontSize:10,fontWeight:sel?700:400,background:sel?sub.bg:"rgba(255,255,255,0.03)",border:"1px solid "+(sel?sub.border:"rgba(255,255,255,0.08)"),color:sel?sub.color:"#555"}}>
                    {sel?"✓ ":""}{e.label.replace("技師【","【")}
                  </button>);
                })}
              </div>
              <div style={{display:"flex",gap:4,flexWrap:"wrap",alignItems:"center"}}>
                <span style={{fontSize:10,color:"#555",flexShrink:0}}>其他：</span>
                {EXAM_TYPES.filter(e=>e.group!=="技師").map(e=>{const sel=type===e.id;return(
                  <button key={e.id} onClick={()=>setType(sel?"":e.id)} style={{padding:"3px 9px",borderRadius:20,fontSize:10,fontWeight:sel?700:400,background:sel?sub.bg:"rgba(255,255,255,0.03)",border:"1px solid "+(sel?sub.border:"rgba(255,255,255,0.08)"),color:sel?sub.color:"#555"}}>
                    {sel?"✓ ":""}{e.label}
                  </button>);
                })}
              </div>
            </div>
            <div style={{display:"flex",gap:6,justifyContent:"flex-end"}}>
              <button onClick={()=>setEditing(false)} style={{padding:"4px 12px",borderRadius:5,fontSize:11,background:"transparent",border:"1px solid rgba(255,255,255,0.08)",color:"#555"}}>取消</button>
              <button onClick={save} style={{padding:"4px 12px",borderRadius:5,fontSize:11,background:"rgba(61,158,110,0.14)",border:"1px solid rgba(61,158,110,0.25)",color:"#3d9e6e",fontWeight:700}}>儲存</button>
            </div>
          </div>
        )}
      </div>

      {confirmDel&&<ConfirmDelModal onConfirm={()=>{setConfirmDel(false);onDel();}} onClose={()=>setConfirmDel(false)}/>}

      <div style={{display:"flex",alignItems:"center",padding:"6px 10px",borderBottom:"1px solid rgba(255,255,255,0.04)",gap:8,cursor:"pointer"}} onClick={()=>setExpanded(v=>!v)}>
        <div style={{flex:1,display:"flex",gap:8}}>
          <span style={{fontSize:10,color:item.q_url?"#4f82cc":"#333"}}>🖼 {item.q_url?"題目":"無題目"}</span>
          <span style={{fontSize:10,color:item.a_url?"#3d9e6e":"#333"}}>{item.a_url?"✓ 答案":"+ 無答案"}</span>
          {item.explanation&&<span style={{fontSize:10,color:"#7255b8"}}>🤖 題解</span>}
        </div>
        <span style={{fontSize:10,color:"#444"}}>{expanded?"▲":"▼"}</span>
      </div>

      {expanded&&(
        <div>
          <div style={{display:"flex",gap:6,padding:"8px 10px",borderBottom:"1px solid rgba(255,255,255,0.04)",background:"rgba(255,255,255,0.02)"}}>
            <button onClick={()=>item.q_url&&onLb({src:item.q_url,title:"#"+(idx+1)+" 題目"})} disabled={!item.q_url}
              style={{flex:1,padding:"6px 4px",borderRadius:6,fontSize:11,background:"rgba(79,130,204,0.08)",border:"1px solid rgba(79,130,204,0.2)",color:item.q_url?"#4f82cc":"#333"}}>
              🖼 {item.q_url?"查看題目":"無題目"}
            </button>
            <button onClick={()=>item.a_url?onLb({src:item.a_url,title:"#"+(idx+1)+" 答案"}):aRef.current?.click()}
              style={{flex:1,padding:"6px 4px",borderRadius:6,fontSize:11,background:"rgba(61,158,110,0.08)",border:"1px solid rgba(61,158,110,0.2)",color:"#3d9e6e"}}>
              {item.a_url?"✓ 查看答案":"＋ 上傳答案"}
            </button>
            {item.a_url&&<button onClick={()=>aRef.current?.click()} style={{padding:"6px 10px",borderRadius:6,fontSize:11,background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.08)",color:"#555"}}>換圖</button>}
            <input ref={aRef} type="file" accept="image/*" style={{display:"none"}} onChange={e=>{onSetAImg(e.target.files?.[0]);e.target.value="";}}/>
          </div>
          {item.q_url&&<div style={{padding:"8px 10px",borderBottom:"1px solid rgba(255,255,255,0.04)",cursor:"pointer"}} onClick={()=>onLb({src:item.q_url,title:"#"+(idx+1)+" 題目"})}>
            <div style={{fontSize:10,color:"#4f82cc",marginBottom:4,fontWeight:600}}>🖼 題目圖片</div>
            <img src={item.q_url} style={{width:"100%",height:"auto",display:"block",borderRadius:6}} alt="q"/>
          </div>}
          {item.a_url&&<div style={{padding:"8px 10px",borderBottom:"1px solid rgba(255,255,255,0.04)",cursor:"pointer",background:"rgba(61,158,110,0.03)"}} onClick={()=>onLb({src:item.a_url,title:"#"+(idx+1)+" 答案"})}>
            <div style={{fontSize:10,color:"#3d9e6e",marginBottom:4,fontWeight:600}}>✓ 答案圖片</div>
            <img src={item.a_url} style={{width:"100%",height:"auto",display:"block",borderRadius:6}} alt="a"/>
          </div>}
          <div style={{padding:"6px 10px"}}>
            <button onClick={doRegen} disabled={regenState==="loading"||!item.q_url}
              style={{width:"100%",padding:6,borderRadius:6,fontSize:10,fontWeight:600,background:regenState==="done"?"rgba(61,158,110,0.1)":regenState==="error"?"rgba(217,95,59,0.1)":"rgba(114,85,184,0.08)",border:"1px solid "+(regenState==="done"?"rgba(61,158,110,0.25)":regenState==="error"?"rgba(217,95,59,0.25)":"rgba(114,85,184,0.2)"),color:regenState==="done"?"#3d9e6e":regenState==="error"?"#d95f3b":"#7255b8",display:"flex",alignItems:"center",justifyContent:"center",gap:5}}>
              {regenState==="loading"?<><span style={{animation:"spin 1s linear infinite",display:"inline-block"}}>⟳</span> 生成中…</>:regenState==="done"?"✓ 題解已更新":regenState==="error"?"✕ 失敗，請重試":item.explanation?"🤖 重新生成題解":"🤖 生成 AI 題解"}
            </button>
          </div>
        </div>
      )}
    </div>
  );
}

function AnsPwModal({ onSuccess, onClose }) {
  const [pw,setPw]=useState(""); const [err,setErr]=useState(false); const ref=useRef();
  useEffect(()=>{setTimeout(()=>ref.current?.focus(),100);},[]);
  const submit=()=>{if(pw===ANS_PW){onSuccess();}else{setErr(true);setPw("");setTimeout(()=>setErr(false),1200);}};
  return (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.88)",zIndex:300,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
      <div style={{background:"#14141c",border:"1px solid rgba(61,158,110,0.3)",borderRadius:16,padding:"28px 24px",width:"100%",maxWidth:320,textAlign:"center"}}>
        <div style={{fontSize:28,marginBottom:12}}>🔐</div>
        <div style={{fontSize:15,fontWeight:700,marginBottom:4}}>查看答案</div>
        <div style={{fontSize:12,color:"#555",marginBottom:20}}>答案受版權保護，請輸入密碼</div>
        <input ref={ref} type="password" value={pw} onChange={e=>setPw(e.target.value)} onKeyDown={e=>e.key==="Enter"&&submit()} placeholder="輸入密碼"
          style={{width:"100%",padding:"11px 14px",borderRadius:9,background:err?"rgba(217,95,59,0.12)":"rgba(255,255,255,0.06)",border:"1px solid "+(err?"rgba(217,95,59,0.5)":"rgba(255,255,255,0.1)"),color:"#ddd",fontSize:15,outline:"none",textAlign:"center",letterSpacing:4,marginBottom:8,transition:"all .2s"}}/>
        {err&&<div style={{fontSize:12,color:"#d95f3b",marginBottom:8}}>密碼錯誤</div>}
        <div style={{display:"flex",gap:8,marginTop:4}}>
          <button onClick={onClose} style={{flex:1,padding:10,borderRadius:8,background:"transparent",border:"1px solid rgba(255,255,255,0.08)",color:"#666",fontSize:13}}>取消</button>
          <button onClick={submit} style={{flex:1,padding:10,borderRadius:8,background:"linear-gradient(135deg,#3d9e6e,#2a7a55)",border:"none",color:"white",fontSize:13,fontWeight:700}}>確認</button>
        </div>
      </div>
    </div>
  );
}

function PwModal({ onSuccess, onClose }) {
  const [pw,setPw]=useState(""); const [err,setErr]=useState(false); const ref=useRef();
  useEffect(()=>{setTimeout(()=>ref.current?.focus(),100);},[]);
  const submit=()=>{if(pw===BANK_PW){onSuccess();}else{setErr(true);setPw("");setTimeout(()=>setErr(false),1200);}};
  return (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.85)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
      <div style={{background:"#14141c",border:"1px solid rgba(255,255,255,0.1)",borderRadius:16,padding:"28px 24px",width:"100%",maxWidth:320,textAlign:"center"}}>
        <div style={{fontSize:28,marginBottom:12}}>🔒</div>
        <div style={{fontSize:15,fontWeight:700,marginBottom:4}}>題庫管理</div>
        <div style={{fontSize:12,color:"#555",marginBottom:20}}>請輸入密碼</div>
        <input ref={ref} type="password" value={pw} onChange={e=>setPw(e.target.value)} onKeyDown={e=>e.key==="Enter"&&submit()} placeholder="輸入密碼"
          style={{width:"100%",padding:"11px 14px",borderRadius:9,background:err?"rgba(217,95,59,0.12)":"rgba(255,255,255,0.06)",border:"1px solid "+(err?"rgba(217,95,59,0.5)":"rgba(255,255,255,0.1)"),color:"#ddd",fontSize:15,outline:"none",textAlign:"center",letterSpacing:4,marginBottom:8,transition:"all .2s"}}/>
        {err&&<div style={{fontSize:12,color:"#d95f3b",marginBottom:8}}>密碼錯誤</div>}
        <div style={{display:"flex",gap:8,marginTop:4}}>
          <button onClick={onClose} style={{flex:1,padding:10,borderRadius:8,background:"transparent",border:"1px solid rgba(255,255,255,0.08)",color:"#666",fontSize:13}}>取消</button>
          <button onClick={submit} style={{flex:1,padding:10,borderRadius:8,background:"linear-gradient(135deg,#4f82cc,#2f5fa0)",border:"none",color:"white",fontSize:13,fontWeight:700}}>確認</button>
        </div>
      </div>
    </div>
  );
}

function ConfirmDelModal({ onConfirm, onClose }) {
  const [step,setStep]=useState(1);
  return (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.85)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
      <div style={{background:"#14141c",border:"1px solid rgba(217,95,59,0.3)",borderRadius:16,padding:"28px 24px",width:"100%",maxWidth:300,textAlign:"center"}}>
        <div style={{fontSize:28,marginBottom:12}}>{step===1?"🗑":"⚠️"}</div>
        <div style={{fontSize:15,fontWeight:700,marginBottom:8,color:"#d95f3b"}}>{step===1?"確定要刪除？":"再次確認刪除"}</div>
        <div style={{fontSize:12,color:"#666",marginBottom:20,lineHeight:1.6}}>{step===1?"這道題目將從題庫中移除":"此操作無法復原，確定要永久刪除嗎？"}</div>
        <div style={{display:"flex",gap:8}}>
          <button onClick={onClose} style={{flex:1,padding:10,borderRadius:8,background:"transparent",border:"1px solid rgba(255,255,255,0.08)",color:"#666",fontSize:13}}>取消</button>
          <button onClick={()=>step===1?setStep(2):onConfirm()} style={{flex:1,padding:10,borderRadius:8,background:"rgba(217,95,59,0.15)",border:"1px solid rgba(217,95,59,0.4)",color:"#d95f3b",fontSize:13,fontWeight:700}}>{step===1?"刪除":"確定刪除"}</button>
        </div>
      </div>
    </div>
  );
}

function Lightbox({ src, title, onClose }) {
  return (
    <div onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.95)",zIndex:400,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:20}}>
      {title&&<div style={{color:"#555",fontSize:11,marginBottom:10,fontFamily:"monospace"}}>{title}</div>}
      <img src={src} style={{maxWidth:"100%",maxHeight:"88vh",borderRadius:8,objectFit:"contain"}} alt=""/>
      <button onClick={onClose} style={{marginTop:14,background:"rgba(255,255,255,0.07)",border:"none",color:"#777",padding:"7px 22px",borderRadius:8,fontSize:13}}>關閉</button>
    </div>
  );
}

function Pill({ children, color, bg, border }) {
  return <span style={{padding:"3px 9px",borderRadius:20,fontSize:11,fontWeight:700,background:bg,border:"1px solid "+border,color,whiteSpace:"nowrap"}}>{children}</span>;
}

function Toggle({ val, set }) {
  return <div onClick={()=>set(!val)} style={{width:44,height:24,borderRadius:12,background:val?"#4f82cc":"rgba(255,255,255,0.08)",cursor:"pointer",position:"relative",transition:"background .2s",flexShrink:0}}>
    <div style={{position:"absolute",top:3,left:val?22:3,width:18,height:18,borderRadius:"50%",background:"white",transition:"left .2s",boxShadow:"0 1px 4px rgba(0,0,0,0.4)"}}/>
  </div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
